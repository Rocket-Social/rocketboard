name: Bug report
description: Report a reproducible bug in Rocketboard
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please include enough detail for someone else to reproduce it.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug and the expected behavior.
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: Where are you running Rocketboard?
      options:
        - Self-hosted
        - Public Fair Source mirror validation
        - Not sure
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Tag, release, or commit SHA
      placeholder: 0.1.0
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps needed to reproduce the problem.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste logs, stack traces, or screenshots if available.
